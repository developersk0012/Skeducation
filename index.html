<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SK Education</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:15px; }
        .login-box { background:white; width:100%; max-width:350px; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center; }
        .logo-container { margin-bottom:20px; }
        .logo-image { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #4361ee; margin-bottom:10px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4361ee; }
        h2 { color:#4361ee; margin-bottom:30px; }
        .error { background:#ffebee; color:#c62828; padding:12px; border-radius:8px; margin-bottom:20px; text-align:center; }
        .form-group { margin-bottom:20px; }
        input { width:100%; padding:12px 15px; border:2px solid #e0e0e0; border-radius:10px; font-size:15px; }
        input:focus { outline:none; border-color:#4361ee; }
        button { width:100%; padding:14px; background:#4361ee; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
        button:hover { background:#3046bf; }
        .link { text-align:center; margin-top:20px; color:#666; font-size:14px; }
        .link a { color:#4361ee; text-decoration:none; font-weight:600; }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <div class="logo-image">SK</div>
        </div>
        <h2>Login to Your Account</h2>
        
        <div id="error" class="error" style="display:none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="user_id" placeholder="User ID or Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="link">New user? <a href="signup.html">Create account</a></div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAEA_jznrLsOcIJ5jR0qmBQwigStJ4RiAw",
            authDomain: "my-last-education.firebaseapp.com",
            databaseURL: "https://my-last-education-default-rtdb.firebaseio.com",
            projectId: "my-last-education",
            storageBucket: "my-last-education.firebasestorage.app",
            messagingSenderId: "916561394351",
            appId: "1:916561394351:android:06445fc6d1de531e99f25a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('user_id').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            if (!userId || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            try {
                const users = await db.ref('users').once('value');
                const usersData = users.val();
                let foundUser = null;
                let userKey = null;
                
                if (usersData) {
                    for (let key in usersData) {
                        if (usersData[key].user_id === userId || usersData[key].email === userId) {
                            foundUser = usersData[key];
                            userKey = key;
                            break;
                        }
                    }
                }
                
                if (foundUser && foundUser.password) {
                    // Simple password check (in production use proper hashing)
                    if (password === foundUser.password || verifyPassword(password, foundUser.password)) {
                        sessionStorage.setItem('user_id', userKey);
                        sessionStorage.setItem('user_name', foundUser.name);
                        sessionStorage.setItem('user_login_id', foundUser.user_id);
                        
                        // Send login notification
                        sendToTelegram('🔐 *USER LOGIN*', {
                            name: foundUser.name,
                            user_id: foundUser.user_id,
                            action: 'Logged in'
                        });
                        
                        window.location.href = 'dashboard.html';
                    } else {
                        showError('Invalid User ID or Password');
                    }
                } else {
                    showError('Invalid User ID or Password');
                }
            } catch (err) {
                showError('Login failed. Please try again.');
                console.error(err);
            }
        });

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }

        function verifyPassword(input, stored) {
            // Simple password verification (in production use bcrypt or similar)
            return input === stored || password_hash(input) === stored;
        }

        function password_hash(password) {
            // Simple hash for demo (use proper hashing in production)
            return btoa(password);
        }

        function sendToTelegram(title, data) {
            const botToken = '7842704749:AAHna10mohLg-2d365DkYEPvi_aqXK4MO0s';
            const chatId = '6416284194';
            
            let message = "📌 *SK EDUCATION STORE*\n";
            message += "━━━━━━━━━━━━━━━━━━━━━\n";
            message += "👤 *User:* " + (data.name || 'Unknown') + "\n";
            message += "⏰ *Time:* " + new Date().toLocaleString() + "\n";
            
            if (data.action) message += "🔹 *Action:* " + data.action + "\n";
            if (data.user_id) message += "🆔 *User ID:* " + data.user_id + "\n";
            if (data.email) message += "📧 *Email:* " + data.email + "\n";
            message += "━━━━━━━━━━━━━━━━━━━━━";
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(err => console.error('Telegram error:', err));
        }
    </script>
</body>
</html>
