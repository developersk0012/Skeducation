<!-- signup.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SK Education</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:15px; }
        .signup-box { background:white; width:100%; max-width:400px; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center; }
        .logo-container { margin-bottom:20px; }
        .logo-image { width:70px; height:70px; border-radius:50%; object-fit:cover; border:3px solid #4361ee; margin-bottom:10px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #4361ee; margin: 0 auto 15px; }
        h2 { color:#4361ee; margin-bottom:10px; }
        .subtitle { color:#666; margin-bottom:25px; font-size:14px; }
        .error { background:#ffebee; color:#c62828; padding:12px; border-radius:8px; margin-bottom:20px; text-align:center; display:none; }
        .form-group { margin-bottom:20px; text-align:left; }
        label { display:block; margin-bottom:5px; color:#555; font-weight:600; font-size:14px; }
        input { width:100%; padding:12px 15px; border:2px solid #e0e0e0; border-radius:10px; font-size:15px; }
        input:focus { outline:none; border-color:#4361ee; }
        button { width:100%; padding:14px; background:#4361ee; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
        button:hover { background:#3046bf; }
        .link { text-align:center; margin-top:20px; color:#666; font-size:14px; }
        .link a { color:#4361ee; text-decoration:none; font-weight:600; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="signup-box">
        <div class="logo-container">
            <div class="logo-image">SK</div>
        </div>
        <h2>Create Account</h2>
        <div class="subtitle">Join us today - It's free!</div>
        
        <div id="error" class="error"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="user_id" placeholder="Choose a user ID (min 4 chars)" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="Re-enter password" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        
        <div class="link">
            Already have an account? <a href="index.html">Login</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEA_jznrLsOcIJ5jR0qmBQwigStJ4RiAw",
            authDomain: "my-last-education.firebaseapp.com",
            databaseURL: "https://my-last-education-default-rtdb.firebaseio.com",
            projectId: "my-last-education",
            storageBucket: "my-last-education.firebasestorage.app",
            messagingSenderId: "916561394351",
            appId: "1:916561394351:android:06445fc6d1de531e99f25a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const userId = document.getElementById('user_id').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error');
            
            if (!name || !email || !userId || !password) {
                showError('Please fill all fields');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Invalid email address');
                return;
            }
            
            if (userId.length < 4) {
                showError('User ID must be at least 4 characters');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            try {
                // Check if user exists
                const users = await db.ref('users').once('value');
                const usersData = users.val();
                let exists = false;
                
                if (usersData) {
                    for (let key in usersData) {
                        if (usersData[key].user_id === userId || usersData[key].email === email) {
                            exists = true;
                            break;
                        }
                    }
                }
                
                if (exists) {
                    showError('User ID or Email already exists');
                    return;
                }
                
                // Create user
                const userData = {
                    name: name,
                    email: email,
                    user_id: userId,
                    password: btoa(password), // Simple encoding (use proper hashing in production)
                    created_at: new Date().toISOString()
                };
                
                const newUserRef = await db.ref('users').push(userData);
                
                sessionStorage.setItem('user_id', newUserRef.key);
                sessionStorage.setItem('user_name', name);
                sessionStorage.setItem('user_login_id', userId);
                
                // Send Telegram notification
                sendToTelegram('🎉 *NEW USER REGISTERED*', {
                    name: name,
                    user_id: userId,
                    email: email,
                    action: 'Account created'
                });
                
                window.location.href = 'welcome.html';
                
            } catch (err) {
                showError('Registration failed. Please try again.');
                console.error(err);
            }
        });

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function sendToTelegram(title, data) {
            const botToken = '7842704749:AAHna10mohLg-2d365DkYEPvi_aqXK4MO0s';
            const chatId = '6416284194';
            
            let message = "📌 *SK EDUCATION STORE*\n";
            message += "━━━━━━━━━━━━━━━━━━━━━\n";
            message += "👤 *User:* " + (data.name || 'Unknown') + "\n";
            message += "⏰ *Time:* " + new Date().toLocaleString() + "\n";
            
            if (data.action) message += "🔹 *Action:* " + data.action + "\n";
            if (data.user_id) message += "🆔 *User ID:* " + data.user_id + "\n";
            if (data.email) message += "📧 *Email:* " + data.email + "\n";
            message += "━━━━━━━━━━━━━━━━━━━━━";
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(err => console.error('Telegram error:', err));
        }
    </script>
</body>
</html>
